<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
}
.banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}
.banner::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 300px;
    height: 300px;
    background: rgba(229, 57, 53, 0.1);
    border-radius: 50%;
}
.banner::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 400px;
    height: 400px;
    background: rgba(66, 165, 245, 0.08);
    border-radius: 50%;
}
.content {
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 1;
}
.icon {
    width: 200px;
    height: 200px;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.text {
    color: white;
}
.text h1 {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 12px;
}
.text p {
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    font-weight: 300;
}
.cards {
    position: absolute;
    right: 40px;
    bottom: 30px;
    display: flex;
    gap: 8px;
    opacity: 0.15;
}
.card {
    width: 60px;
    height: 80px;
    border-radius: 8px;
    transform: rotate(-5deg);
}
.card:nth-child(1) { background: #42A5F5; }
.card:nth-child(2) { background: #FFEE58; transform: rotate(0deg); }
.card:nth-child(3) { background: #EF5350; transform: rotate(5deg); }
</style>
</head>
<body>
<div class="banner">
    <div class="content">
        <div class="icon">
            <img src="icon/td801.png" alt="TubeDeck">
        </div>
        <div class="text">
            <h1>TubeDeck</h1>
            <p>Your YouTube Subscriptions, Organized</p>
        </div>
    </div>
    <div class="cards">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</div>
</body>
</html>
