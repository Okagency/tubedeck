<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#212121"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 둥근 사각형 배경 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg4)"/>

  <!-- 영상 카드 1 (상단) -->
  <g filter="url(#shadow4)">
    <rect x="96" y="80" width="320" height="100" rx="12" fill="#FFFFFF"/>
    <!-- 썸네일 영역 -->
    <rect x="108" y="92" width="120" height="76" rx="8" fill="#FF0000"/>
    <!-- 재생 아이콘 -->
    <polygon points="155,115 155,145 180,130" fill="#FFFFFF"/>
    <!-- 텍스트 라인 -->
    <rect x="244" y="100" width="140" height="12" rx="4" fill="#333333"/>
    <rect x="244" y="120" width="100" height="8" rx="4" fill="#999999"/>
    <rect x="244" y="140" width="60" height="8" rx="4" fill="#CCCCCC"/>
  </g>

  <!-- 영상 카드 2 (중간) -->
  <g filter="url(#shadow4)">
    <rect x="96" y="200" width="320" height="100" rx="12" fill="#FFFFFF"/>
    <rect x="108" y="212" width="120" height="76" rx="8" fill="#FF0000"/>
    <polygon points="155,235 155,265 180,250" fill="#FFFFFF"/>
    <rect x="244" y="220" width="140" height="12" rx="4" fill="#333333"/>
    <rect x="244" y="240" width="100" height="8" rx="4" fill="#999999"/>
    <rect x="244" y="260" width="60" height="8" rx="4" fill="#CCCCCC"/>
  </g>

  <!-- 영상 카드 3 (하단) -->
  <g filter="url(#shadow4)">
    <rect x="96" y="320" width="320" height="100" rx="12" fill="#FFFFFF"/>
    <rect x="108" y="332" width="120" height="76" rx="8" fill="#FF0000"/>
    <polygon points="155,355 155,385 180,370" fill="#FFFFFF"/>
    <rect x="244" y="340" width="140" height="12" rx="4" fill="#333333"/>
    <rect x="244" y="360" width="100" height="8" rx="4" fill="#999999"/>
    <rect x="244" y="380" width="60" height="8" rx="4" fill="#CCCCCC"/>
  </g>
</svg>
