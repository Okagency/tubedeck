<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 둥근 사각형 배경 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg2)"/>

  <!-- 부채꼴 카드들 (뒤에서 앞으로) -->
  <!-- 카드 왼쪽 -->
  <rect x="120" y="140" width="140" height="100" rx="10" fill="#4a90d9" transform="rotate(-25, 200, 220)" filter="url(#shadow2)"/>

  <!-- 카드 오른쪽 -->
  <rect x="252" y="140" width="140" height="100" rx="10" fill="#f7b731" transform="rotate(25, 312, 220)" filter="url(#shadow2)"/>

  <!-- 카드 중앙 -->
  <rect x="186" y="130" width="140" height="100" rx="10" fill="#FFFFFF" filter="url(#shadow2)"/>

  <!-- 큰 재생 버튼 (중앙) -->
  <circle cx="256" cy="260" r="70" fill="#FF0000" filter="url(#shadow2)"/>
  <circle cx="256" cy="260" r="60" fill="#FF0000" stroke="#FFFFFF" stroke-width="4"/>
  <polygon points="238,230 238,290 288,260" fill="#FFFFFF"/>

  <!-- TubeDeck 텍스트 -->
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TubeDeck</text>
</svg>
