<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000"/>
      <stop offset="100%" style="stop-color:#CC0000"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 둥근 사각형 배경 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg1)"/>

  <!-- 카드 3 (뒤) -->
  <rect x="140" y="100" width="200" height="140" rx="12" fill="#FFFFFF" opacity="0.5" transform="rotate(-10, 256, 200)" filter="url(#shadow1)"/>

  <!-- 카드 2 (중간) -->
  <rect x="150" y="120" width="200" height="140" rx="12" fill="#FFFFFF" opacity="0.75" transform="rotate(-5, 256, 220)" filter="url(#shadow1)"/>

  <!-- 카드 1 (앞) - 재생버튼 포함 -->
  <rect x="156" y="140" width="200" height="140" rx="12" fill="#FFFFFF" filter="url(#shadow1)"/>

  <!-- 재생 버튼 -->
  <circle cx="256" cy="210" r="35" fill="#FF0000"/>
  <polygon points="245,190 245,230 275,210" fill="#FFFFFF"/>

  <!-- 텍스트 영역 (카드 하단) -->
  <rect x="170" y="255" width="120" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="170" y="268" width="80" height="6" rx="3" fill="#E0E0E0"/>

  <!-- TubeDeck 텍스트 -->
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TubeDeck</text>
</svg>
