<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경 -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4444"/>
      <stop offset="100%" style="stop-color:#CC0000"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 둥근 사각형 배경 -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg3)"/>

  <!-- TV/모니터 프레임 -->
  <rect x="96" y="80" width="320" height="240" rx="24" fill="#FFFFFF" filter="url(#shadow3)"/>

  <!-- TV 화면 (어두운 부분) -->
  <rect x="112" y="96" width="288" height="192" rx="12" fill="#1a1a2e"/>

  <!-- 재생 버튼 -->
  <circle cx="256" cy="192" r="50" fill="rgba(255,255,255,0.2)"/>
  <polygon points="238,165 238,219 282,192" fill="#FFFFFF"/>

  <!-- TV 스탠드 -->
  <rect x="216" y="320" width="80" height="12" rx="4" fill="#FFFFFF"/>
  <rect x="196" y="332" width="120" height="8" rx="4" fill="#FFFFFF" opacity="0.8"/>

  <!-- 하단 카드 3개 -->
  <rect x="116" y="370" width="80" height="56" rx="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="216" y="370" width="80" height="56" rx="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="316" y="370" width="80" height="56" rx="8" fill="#FFFFFF" opacity="0.9"/>

  <!-- 카드 안의 미니 재생 아이콘 -->
  <polygon points="148,390 148,414 168,402" fill="#FF0000"/>
  <polygon points="248,390 248,414 268,402" fill="#FF0000"/>
  <polygon points="348,390 348,414 368,402" fill="#FF0000"/>
</svg>
